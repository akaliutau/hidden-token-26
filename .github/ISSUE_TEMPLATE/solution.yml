name: Challenge Solution
about: Submit your proof of discovery - create an issue - and contact details
labels: [solution]
body:
  - type: textarea
    id: contact
    attributes:
      label: Contact information
      description: Email, GitHub, or anything else.
      placeholder: name@example.com | github.com/handle
    validations:
      required: true

  - type: textarea
    id: message
    attributes:
      label: Message
      description: Tell us, how you approached the challenge?
      placeholder: I found the fragments, reconstructed the token, and opened this issue.
    validations:
      required: false



